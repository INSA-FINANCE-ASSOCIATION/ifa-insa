<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable | INSA Finance Association</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" sizes="any" href="assets/logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/logo.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="modern.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@400;600;700&subset=latin,latin-ext&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-dark);
            padding: 40px 20px;
        }
        .error-content {
            text-align: center;
            max-width: 560px;
        }
        .error-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 48px;
        }
        .error-logo img { width: 48px; height: 48px; object-fit: contain; }
        .error-logo span {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
        }
        .error-number {
            font-family: 'Playfair Display', serif;
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 8px;
        }
        .error-title {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
        }
        .error-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.7;
            margin-bottom: 40px;
        }
        .error-links {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .error-btn-primary {
            background: var(--gold);
            color: var(--primary-dark);
        }
        .error-btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
        .error-btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .error-btn-secondary:hover { background: rgba(255,255,255,0.18); transform: translateY(-2px); }
        .error-divider {
            width: 60px;
            height: 3px;
            background: var(--gold);
            margin: 24px auto 32px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-logo">
                <img src="assets/logo.png" alt="Logo IFA">
                <span>I.F.A.</span>
            </div>
            <div class="error-number">404</div>
            <div class="error-divider"></div>
            <h1 class="error-title">Page introuvable</h1>
            <p class="error-subtitle">
                Cette page n'existe pas ou a été déplacée.<br>
                Retourne sur le site pour continuer à explorer l'IFA.
            </p>
            <div class="error-links">
                <a href="index.html" class="error-btn error-btn-primary">
                    <i class="fas fa-home"></i> Accueil
                </a>
                <a href="evenements.html" class="error-btn error-btn-secondary">
                    <i class="fas fa-calendar-check"></i> Événements
                </a>
                <a href="partenaires.html" class="error-btn error-btn-secondary">
                    <i class="fas fa-handshake"></i> Partenaires
                </a>
                <a href="soutenir.html" class="error-btn error-btn-secondary">
                    <i class="fas fa-heart"></i> Nous soutenir
                </a>
            </div>
        </div>
    </div>
</body>
</html>
